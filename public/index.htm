<!DOCTYPE html>
<html lang="en">
<head>
    <title>Football Tech Blog</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
    <div id="auth-container" class="container">
        <h2>Football Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
        <hr>
        <h2>Register</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
    <button onclick="register()">Register</button>
        <hr>
    </div>

    <div id="app-container" class="container hidden">
        <h2>Football Transfer & Tech News</h2>

         <h2 id="posts-heading">All News</h2>

        <div class="filters">
            <button onclick="fetchPosts()">All News</button>
            <button onclick="fetchPosts(1)">Premier League</button>
            <button onclick="fetchPosts(2)">Tech in Sport</button>
        </div>
        <hr>

        <div class="post-form">
            <h3>Share an Update</h3>
            <input type="text" id="post-title" placeholder="Article Title">
            <textarea id="post-content" placeholder="Write your news ..."></textarea>

            <label for="post-category">Post to Page:</label>
            <select id="post-category">
                <option value="1">Premier League</option>
                <option value="2">Tech in Sport</option>
            </select>

            <button onclick="createPost()">Post Update</button>

            <button onclick="fetchPosts()">Load Posts</button>

            <div id="posts"></div>
        </div>
    <script src="./assets/script.js"></script>
</body>
</html>
