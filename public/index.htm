<!DOCTYPE html>
<html lang="en">
<head>
    <title>Football Tech Blog</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
    <div id="auth-container" class="container">
        <h2>Football Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="app-container" class="container hidden">
        <h2>Football Transfer & Tech News</h2>
        <div class="filters">
            <button onclick="fetchPosts()">All News</button>
            <button onclick="fetchPosts()">Premier League</button>
            <button onclick="fetchPosts()">Tech in Sport</button>
        </div>
        <hr>
        <input type="text" id="post-title" placeholder="Article Title">
        <textarea id="post-content" placeholder="Content"></textarea>
        <button onclick="createPost()">Post Update</button>
        <div id="posts"></div>
    </div>
    <script src="./assets/script.js"></script>
</body>
</html>
